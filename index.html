<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>탐색생물학2팀 회식 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f2ede8;
      color: #222;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* 헤더 */
    header {
      background: #8b1a1a;
      color: #fff;
      padding: 14px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }

    /* 전체 합계 바 */
    .summary-bar {
      background: #3d0a0a;
      color: #fff;
      padding: 10px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
    }
    .s-item { text-align: center; }
    .s-label { font-size: 0.72rem; opacity: 0.65; margin-bottom: 2px; }
    .s-val { font-size: 0.95rem; font-weight: 700; }
    .s-item.ok .s-val  { color: #4ade80; }
    .s-item.over .s-val { color: #f87171; }

    /* 테이블 탭 */
    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: #fff;
      border-bottom: 2px solid #8b1a1a;
    }
    .tab-btn {
      padding: 12px 4px;
      border: none;
      background: transparent;
      font-size: 0.85rem;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s;
    }
    .tab-btn.active { color: #8b1a1a; border-bottom-color: #8b1a1a; }

    /* 테이블 카드 요약 (탭 아래) */
    .active-card {
      background: #fff;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e8e0da;
    }
    .ac-budget { font-size: 0.78rem; color: #888; }
    .ac-total  { font-size: 1rem; font-weight: 700; }
    .ac-status { font-size: 0.9rem; font-weight: 700; }
    .ac-status.ok   { color: #27ae60; }
    .ac-status.over { color: #c0392b; }

    /* 패널 */
    .panel { display: none; }
    .panel.active { display: block; }

    /* 카테고리 구분선 */
    .cat-header {
      padding: 8px 16px 4px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #8b1a1a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #f2ede8;
    }

    /* 메뉴 아이템 */
    .menu-list { background: #fff; }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid #f0ece8;
      gap: 8px;
    }
    .menu-item:last-child { border-bottom: none; }

    .menu-info { flex: 1; min-width: 0; }
    .menu-name { font-size: 0.95rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .menu-sub  { font-size: 0.78rem; color: #888; margin-top: 2px; }

    .qty-ctrl { display: flex; align-items: center; gap: 0; flex-shrink: 0; }
    .qty-btn {
      width: 38px; height: 38px;
      border: none;
      border-radius: 50%;
      background: #8b1a1a;
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s;
      user-select: none;
    }
    .qty-btn:active { background: #6a1010; }
    .qty-num {
      min-width: 36px;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 700;
      color: #222;
    }
    .qty-num.nonzero { color: #8b1a1a; }

    /* 하단 고정 푸터 */
    .footer {
      position: sticky;
      bottom: 0;
      background: #fff;
      border-top: 2px solid #e0d6d0;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
    }
    .footer-left { flex: 1; }
    .total-text { font-size: 1.1rem; font-weight: 700; }
    .status { font-size: 0.88rem; font-weight: 700; margin-top: 2px; }
    .status.ok   { color: #27ae60; }
    .status.over { color: #c0392b; }

    .reset-btn {
      padding: 10px 16px;
      background: #f2ede8;
      color: #8b1a1a;
      border: 1.5px solid #8b1a1a;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .reset-btn:active { background: #e8ddd6; }

    /* 패널 내부 여백 (푸터 높이만큼) */
    .panel-content { padding-bottom: 80px; }
  </style>
</head>
<body>

<header>
  <h1>탐색생물학2팀 회식 계산기</h1>
</header>

<div class="summary-bar">
  <div class="s-item">
    <div class="s-label">전체 예산</div>
    <div class="s-val" id="sum-budget">0원</div>
  </div>
  <div class="s-item">
    <div class="s-label">사용액</div>
    <div class="s-val" id="sum-total">0원</div>
  </div>
  <div class="s-item" id="sum-status-wrap">
    <div class="s-label" id="sum-status-label">잔액</div>
    <div class="s-val" id="sum-status">0원</div>
  </div>
</div>

<div class="tabs" id="tabs"></div>
<div class="active-card" id="active-card">
  <div>
    <div class="ac-budget" id="ac-budget"></div>
    <div class="ac-total"  id="ac-total">0원</div>
  </div>
  <div class="ac-status ok" id="ac-status"></div>
</div>
<div id="panels"></div>

<script>
const MENU = [
  { name: "한우 생갈비",     desc: "1인분 250g · 109,000원", price: 109000, cat: "메인" },
  { name: "한우 양념갈비",   desc: "1인분 270g · 79,000원",  price:  79000, cat: "메인" },
  { name: "한우 채끝등심",   desc: "1인분 150g · 69,000원",  price:  69000, cat: "메인" },
  { name: "한우 육회",       desc: "1인분 180g · 39,000원",  price:  39000, cat: "메인" },
  { name: "미국산 생갈비",   desc: "1인분 450g · 79,000원",  price:  79000, cat: "메인" },
  { name: "미국산 양념갈비", desc: "1인분 450g · 71,000원",  price:  71000, cat: "메인" },
  { name: "한우갈비탕",      desc: "1그릇 · 28,000원",       price:  28000, cat: "식사" },
  { name: "된장찌개",        desc: "1그릇 · 5,000원",        price:   5000, cat: "식사" },
  { name: "물냉면",          desc: "1그릇 · 12,000원",       price:  12000, cat: "식사" },
  { name: "비빔냉면",        desc: "1그릇 · 12,000원",       price:  12000, cat: "식사" },
  { name: "소주",            desc: "1병 · 6,000원",          price:   6000, cat: "음료" },
  { name: "맥주",            desc: "1병 · 6,000원",          price:   6000, cat: "음료" },
  { name: "음료수",          desc: "1개 · 2,000원",          price:   2000, cat: "음료" },
];

const BUDGETS = [550714, 734286, 734286, 550714];
const NUM_TABLES = 4;

const state = Array.from({ length: NUM_TABLES }, () => Array(MENU.length).fill(0));
let currentTab = 0;

function fmt(n) { return n.toLocaleString("ko-KR") + "원"; }

function buildUI() {
  const tabsEl   = document.getElementById("tabs");
  const panelsEl = document.getElementById("panels");

  document.getElementById("sum-budget").textContent = fmt(BUDGETS.reduce((a,b)=>a+b,0));
  document.getElementById("ac-budget").textContent  = `예산 ${fmt(BUDGETS[0])}`;
  document.getElementById("ac-status").textContent  = `잔액 ${fmt(BUDGETS[0])}`;

  // 카테고리 순서
  const cats = ["메인", "식사", "음료"];

  for (let t = 0; t < NUM_TABLES; t++) {
    // 탭 버튼
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (t === 0 ? " active" : "");
    btn.textContent = `테이블 ${t+1}`;
    btn.onclick = () => switchTab(t);
    tabsEl.appendChild(btn);

    // 패널
    const panel = document.createElement("div");
    panel.className = "panel" + (t === 0 ? " active" : "");
    panel.id = `panel-${t}`;

    const content = document.createElement("div");
    content.className = "panel-content";

    cats.forEach(cat => {
      const items = MENU.map((m,i)=>({...m,i})).filter(m=>m.cat===cat);
      if (!items.length) return;

      const catEl = document.createElement("div");
      catEl.className = "cat-header";
      catEl.textContent = cat;
      content.appendChild(catEl);

      const list = document.createElement("div");
      list.className = "menu-list";

      items.forEach(({ name, desc, i }) => {
        list.innerHTML += `
          <div class="menu-item">
            <div class="menu-info">
              <div class="menu-name">${name}</div>
              <div class="menu-sub">${desc}</div>
            </div>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="change(${t},${i},-1)">−</button>
              <span class="qty-num" id="qty-${t}-${i}">0</span>
              <button class="qty-btn" onclick="change(${t},${i},1)">+</button>
            </div>
          </div>`;
      });

      content.appendChild(list);
    });

    // 푸터
    const footer = document.createElement("div");
    footer.className = "footer";
    footer.innerHTML = `
      <div class="footer-left">
        <div class="total-text" id="total-${t}">합계: 0원</div>
        <div class="status ok" id="status-${t}">잔액: ${fmt(BUDGETS[t])}</div>
      </div>
      <button class="reset-btn" onclick="reset(${t})">초기화</button>`;

    panel.appendChild(content);
    panel.appendChild(footer);
    panelsEl.appendChild(panel);
  }
}

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll(".tab-btn").forEach((b,i) => b.classList.toggle("active", i===t));
  document.querySelectorAll(".panel").forEach((p,i) => p.classList.toggle("active", i===t));
  refreshActiveCard(t);
}

function refreshActiveCard(t) {
  const total  = state[t].reduce((s,q,i)=>s+q*MENU[i].price, 0);
  const rem    = BUDGETS[t] - total;
  document.getElementById("ac-budget").textContent = `예산 ${fmt(BUDGETS[t])}`;
  document.getElementById("ac-total").textContent  = fmt(total);
  const acStatus = document.getElementById("ac-status");
  if (rem >= 0) {
    acStatus.textContent = `잔액 ${fmt(rem)}`;
    acStatus.className   = "ac-status ok";
  } else {
    acStatus.textContent = `초과 ${fmt(-rem)}`;
    acStatus.className   = "ac-status over";
  }
}

/* ── Firebase ── */
const DB_URL = "https://hoesik-calculator-default-rtdb.asia-southeast1.firebasedatabase.app";
let _protectedUntil = 0;

async function pushState() {
  try {
    await fetch(`${DB_URL}/state.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
  } catch(e) { console.warn('Firebase 저장 실패', e); }
}

function toArr(val, len) {
  const arr = Array(len).fill(0);
  if (!val) return arr;
  if (Array.isArray(val)) {
    val.forEach((v,i)=>{ if(i<len) arr[i]=v||0; });
  } else if (typeof val === 'object') {
    Object.entries(val).forEach(([k,v])=>{
      const idx=parseInt(k); if(!isNaN(idx)&&idx<len) arr[idx]=v||0;
    });
  }
  return arr;
}

function applyStateToUI(newState) {
  newState.forEach((table, t) => {
    table.forEach((qty, i) => {
      state[t][i] = qty || 0;
      const numEl = document.getElementById(`qty-${t}-${i}`);
      if (numEl) {
        numEl.textContent = state[t][i];
        numEl.className   = state[t][i] > 0 ? "qty-num nonzero" : "qty-num";
      }
    });
    refreshTable(t);
  });
  refreshSummary();
}

async function poll() {
  try {
    if (Date.now() >= _protectedUntil) {
      const res  = await fetch(`${DB_URL}/state.json?t=${Date.now()}`);
      const data = await res.json();
      if (data && !data.error) {
        const normalized = toArr(data, NUM_TABLES).map(row => toArr(row, MENU.length));
        applyStateToUI(normalized);
      }
    }
  } catch(e) {}
  setTimeout(poll, 1500);
}

function change(t, i, delta) {
  state[t][i] = Math.max(0, state[t][i] + delta);
  const numEl = document.getElementById(`qty-${t}-${i}`);
  numEl.textContent = state[t][i];
  numEl.className   = state[t][i] > 0 ? "qty-num nonzero" : "qty-num";
  refreshTable(t);
  refreshSummary();
  _protectedUntil = Date.now() + 3000;
  pushState();
}

function refreshTable(t) {
  const total = state[t].reduce((s,q,i)=>s+q*MENU[i].price, 0);
  const rem   = BUDGETS[t] - total;

  const totalEl  = document.getElementById(`total-${t}`);
  const statusEl = document.getElementById(`status-${t}`);
  if (totalEl)  totalEl.textContent = `합계: ${fmt(total)}`;
  if (statusEl) {
    statusEl.textContent = rem>=0 ? `잔액: ${fmt(rem)}` : `초과: ${fmt(-rem)}`;
    statusEl.className   = rem>=0 ? "status ok" : "status over";
  }
  if (t === currentTab) refreshActiveCard(t);
}

function refreshSummary() {
  const totalSpent  = state.reduce((sum,table)=>sum+table.reduce((s,q,i)=>s+q*MENU[i].price,0),0);
  const totalBudget = BUDGETS.reduce((a,b)=>a+b,0);
  const rem         = totalBudget - totalSpent;

  document.getElementById("sum-total").textContent = fmt(totalSpent);

  const wrap  = document.getElementById("sum-status-wrap");
  const label = document.getElementById("sum-status-label");
  const val   = document.getElementById("sum-status");
  label.textContent = rem>=0 ? "잔액" : "초과";
  val.textContent   = rem>=0 ? fmt(rem) : fmt(-rem);
  wrap.className    = rem>=0 ? "s-item ok" : "s-item over";
}

function reset(t) {
  if (!confirm(`테이블 ${t+1}을 초기화하시겠습니까?`)) return;
  state[t].fill(0);
  MENU.forEach((_,i)=>{
    const numEl = document.getElementById(`qty-${t}-${i}`);
    if (numEl) { numEl.textContent = "0"; numEl.className = "qty-num"; }
  });
  refreshTable(t);
  refreshSummary();
  _protectedUntil = Date.now() + 3000;
  pushState();
}

buildUI();
poll();
</script>
</body>
</html>
